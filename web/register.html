<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Auth Service</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="form-box">
            <h1>Register</h1>
            <form id="registerForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Register</button>
                <div id="error" class="error"></div>
                <div id="success" class="success"></div>
            </form>
            <div class="divider">OR</div>
            <a href="#" id="googleLogin" class="google-btn">
                <img src="https://lh3.googleusercontent.com/COxitqSg9zYwIt8sreCmthByo7IfGjkvchW5G4E95xrCC0yAtNn89V07Lo-mYp_W17LqWInpBCos9T9MvA609NWhInSX9GZ9M3m7"
                    alt="Google Logo">
                Sign in with Google
            </a>
            <p class="link">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');

            errorDiv.textContent = '';
            successDiv.textContent = '';

            try {
                const response = await fetch('http://localhost:8080/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: email, password })
                });

                if (response.ok) {
                    successDiv.textContent = 'Registration successful! Redirecting to login...';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.error || 'Registration failed';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Make sure the server is running.';
            }
        });
        document.getElementById('googleLogin').addEventListener('click', (e) => {
            e.preventDefault();
            const clientID = '723755461536-m1jgt7l2jttm46m4b7kecs5u2sudi5au.apps.googleusercontent.com';
            const redirectURI = encodeURIComponent('http://localhost:8080/callback.html');
            const scope = encodeURIComponent('openid email profile');
            const responseType = 'code';

            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientID}&redirect_uri=${redirectURI}&response_type=${responseType}&scope=${scope}&access_type=offline&prompt=consent`;

            window.location.href = authUrl;
        });
    </script>
</body>

</html>
